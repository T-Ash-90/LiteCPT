<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .splash-container {
      position: relative;
      width: 250px;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #logo {
      width: 100px;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7));
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }

    .loading-text {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      color: #666;
      text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
      animation: typing 1.5s steps(10, end) infinite;
    }

    @keyframes typing {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img src="../frontend/src/assets/images/logo.png" id="logo" alt="Logo">
    <div class="loading-text">Loading...</div>
  </div>
</body>
</html>
